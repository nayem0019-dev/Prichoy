<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Product — Prichoy Clothing</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="navMount"></div><div id="cartMount"></div><div id="authMount"></div>
<main id="pdpMain">
  <div style="text-align:center;padding:80px 24px;color:var(--ink-muted);font-family:var(--ff-serif);font-style:italic">Loading…</div>
</main>
<div id="footerMount"></div>
<script src="../js/components.js"></script>
<script src="../js/app.js"></script>
<script>
  document.getElementById("navMount").innerHTML    = renderNav("shop", true);
  document.getElementById("cartMount").innerHTML   = renderCart();
  document.getElementById("authMount").innerHTML   = renderAuthModal();
  document.getElementById("footerMount").innerHTML = renderFooter(true);

  var pid = parseInt(new URLSearchParams(window.location.search).get("id"));
  var p   = PRODUCTS.find(function(x){ return x.id===pid; });

  var selSizeVal=null, selColor=null, selQty=1;
  var isM = p && p.gender==="men";

  var EXTRA_IMGS = [
    "https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=700&q=80",
    "https://images.unsplash.com/photo-1582533561751-ef6f6ab93a2e?w=700&q=80",
    "https://images.unsplash.com/photo-1594938298603-c8148c4b4ac8?w=700&q=80",
  ];

  function buildPage(p){
    document.title = p.name + " — Prichoy";
    var imgs = [p.image].concat(EXTRA_IMGS);
    var disc = p.originalPrice ? Math.round((1-p.price/p.originalPrice)*100) : 0;
    selColor = p.colors[0];
    var accentBtn  = isM ? "btn-men"   : "btn-women";
    var accentCol  = isM ? "var(--men)": "var(--women)";
    var genderTag  = isM ? '<span class="p-card-gender"><span class="tag-men">👔 Men\'s</span></span>' : '<span class="p-card-gender"><span class="tag-women">👗 Women\'s</span></span>';

    document.getElementById("pdpMain").innerHTML = `
      <div class="breadcrumb"><a href="../index.html">Home</a><span class="sep">›</span><a href="shop.html">Shop</a><span class="sep">›</span><span>${p.name}</span></div>
      <div class="pdp-wrap">
        <!-- Gallery -->
        <div class="pdp-gallery">
          <div class="g-main">
            <img id="gMainImg" src="${imgs[0]}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=700&q=80'">
          </div>
          <div class="g-thumbs">
            ${imgs.map(function(img,i){ return '<div class="g-thumb '+(i===0?"on":"")+'\" onclick="switchImg('+i+')" id="gth'+i+'"><img src="'+img+'" alt="View '+(i+1)+'" onerror="this.src=\'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=200&q=60\'"></div>'; }).join("")}
          </div>
        </div>

        <!-- Info -->
        <div class="pdp-info">
          ${genderTag}
          <span class="label" style="color:${accentCol};margin-bottom:10px;display:inline-block">${p.category}</span>
          ${p.badge ? '<span class="p-card-badge badge-'+p.badge.toLowerCase()+'" style="position:relative;top:auto;left:auto;margin-left:8px">'+p.badge+'</span>' : ""}
          <h1 class="pdp-name">${p.name}</h1>
          <div class="pdp-rating">
            <span class="stars">${"★".repeat(Math.floor(p.rating))}${p.rating%1?"☆":""}</span>
            <span>${p.rating} &nbsp;·&nbsp; ${p.reviews} reviews</span>
          </div>
          <div class="pdp-stock"><span class="pdp-stock-dot"></span>In Stock — Ready to Ship</div>

          ${p.discount ? `
          <div style="background:var(--green-bg);border:1.5px solid var(--green-bg2);border-radius:var(--r-lg);padding:14px 18px;margin-bottom:18px">
            <div style="font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:4px">🏷️ Auto-Discount Applied</div>
            <div style="font-size:.88rem;color:var(--green-2);font-weight:600">${p.discount.label}</div>
            <div style="font-size:.72rem;color:var(--green-lt);margin-top:3px">Code <strong>${p.discount.code}</strong> auto-applied at checkout</div>
          </div>` : ""}

          <div class="pdp-price">
            <span class="pdp-price-now">৳${p.price.toLocaleString()}</span>
            ${p.originalPrice ? '<span class="pdp-price-was">৳'+p.originalPrice.toLocaleString()+'</span>' : ""}
            ${disc>=5 ? '<span class="pdp-price-pct">'+disc+'% OFF</span>' : ""}
          </div>

          <p class="pdp-desc">${p.description}</p>

          <!-- Colour -->
          <div class="opt-label">Colour</div>
          <div class="color-opts" id="colOpts">
            ${p.colors.map(function(c,i){ return '<div class="col-dot '+(i===0?"on":"")+'\" style="background:'+c+'" onclick="selCol(\''+c+'\',this)" title="'+c+'"></div>'; }).join("")}
          </div>

          <!-- Size -->
          <div class="opt-label">Size &nbsp;<a href="#sizeGuide" style="font-size:.68rem;color:var(--green);font-weight:600;text-transform:none;letter-spacing:0">Size Guide</a></div>
          <div class="size-opts" id="sizeOpts">
            ${p.sizes.map(function(s){ return '<button class="sz-btn" onclick="selSz(\''+s+'\',this)">'+s+'</button>'; }).join("")}
          </div>

          <!-- Qty -->
          <div class="opt-label">Quantity</div>
          <div class="qty-row">
            <button class="qty-b2" onclick="chgQty(-1)">−</button>
            <input type="number" class="qty-n" id="qtyN" value="1" min="1" max="20" onchange="setQty(this.value)">
            <button class="qty-b2" onclick="chgQty(1)">+</button>
          </div>

          <!-- CTAs -->
          <div class="pdp-ctas">
            <button class="btn btn-black btn-lg" onclick="doAdd()">Add to Cart 🛍️</button>
            <button class="btn ${accentBtn} btn-lg" onclick="doBuy()">Buy Now →</button>
            <button class="nav-icon-btn" data-wid="${p.id}"
              onclick="wishToggle(${p.id}); this.innerHTML=isWished(${p.id})?'♥':'♡'; this.classList.toggle('loved',isWished(${p.id}))"
              style="border:1.5px solid var(--line);border-radius:var(--r-full);width:auto;padding:0 16px;font-size:1.1rem"
              title="Wishlist">${isWished(p.id)?"♥":"♡"}</button>
          </div>

          <div class="pdp-guarantee">
            <span class="g-item">🚚 48hr Dhaka delivery</span>
            <span class="g-item">✅ Check on delivery</span>
            <span class="g-item">💵 Cash on delivery</span>
            <span class="g-item">🔒 Secure order</span>
          </div>

          <!-- Tabs -->
          <div class="pdp-tabs-wrap" id="sizeGuide">
            <div class="pdp-tab-btns">
              <button class="pdp-tab-btn on" onclick="swTab('desc',this)">Description</button>
              <button class="pdp-tab-btn"    onclick="swTab('fabric',this)">Fabric &amp; Care</button>
              <button class="pdp-tab-btn"    onclick="swTab('reviews',this)">Reviews (${p.reviews})</button>
              <button class="pdp-tab-btn"    onclick="swTab('delivery',this)">Delivery</button>
            </div>
            <div id="tab-desc" class="pdp-tab-pane on">
              <p>${p.description}</p>
              <ul style="margin-top:12px;padding-left:18px;list-style:disc;line-height:2.1">
                <li>Premium quality, carefully sourced fabric</li>
                <li>Available sizes: ${p.sizes.join(", ")}</li>
                <li>${isM?"Men's tailored fit":"Women's curated silhouette"}</li>
                <li>Perfect for ${isM?"everyday and ethnic wear":"casual, festive and semi-formal occasions"}</li>
              </ul>
            </div>
            <div id="tab-fabric" class="pdp-tab-pane">
              <p><strong>Fabric:</strong> ${p.fabric}</p>
              <p style="margin-top:10px"><strong>Care Instructions:</strong> ${p.care}</p>
              <p style="margin-top:10px">Store in a cool, dry place away from direct sunlight to maintain colour vibrancy and fabric quality.</p>
            </div>
            <div id="tab-reviews" class="pdp-tab-pane">
              <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;padding-bottom:18px;border-bottom:1.5px solid var(--line)">
                <div style="text-align:center">
                  <div style="font-family:var(--ff-serif);font-size:3.2rem;font-weight:500;color:var(--ink);line-height:1">${p.rating}</div>
                  <div style="color:var(--gold);font-size:1rem;margin:4px 0">${"★".repeat(Math.floor(p.rating))}</div>
                  <div style="font-size:.68rem;color:var(--ink-muted)">${p.reviews} reviews</div>
                </div>
                <div style="flex:1">
                  ${[5,4,3,2,1].map(function(n){var pct=n===5?65:n===4?22:n===3?9:n===2?3:1;return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px"><span style="font-size:.68rem;width:8px;color:var(--ink-muted)">'+n+'</span><span style="color:var(--gold);font-size:.72rem">★</span><div style="flex:1;height:4px;background:var(--line);border-radius:2px"><div style="width:'+pct+'%;height:100%;background:var(--gold);border-radius:2px"></div></div><span style="font-size:.65rem;color:var(--ink-muted);width:24px">'+pct+'%</span></div>';}).join("")}
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:14px">
                <div style="padding:14px;background:var(--off-white);border-radius:var(--r-lg);border:1.5px solid var(--line)">
                  <div style="display:flex;justify-content:space-between;margin-bottom:5px"><strong style="font-size:.85rem">Fatima S.</strong><span style="color:var(--gold)">★★★★★</span></div>
                  <p style="font-size:.82rem;color:var(--ink-soft)">"Beautiful fabric and perfect fit! Fast delivery and exactly as shown. Will definitely order again."</p>
                </div>
                <div style="padding:14px;background:var(--off-white);border-radius:var(--r-lg);border:1.5px solid var(--line)">
                  <div style="display:flex;justify-content:space-between;margin-bottom:5px"><strong style="font-size:.85rem">Rahim K.</strong><span style="color:var(--gold)">★★★★★</span></div>
                  <p style="font-size:.82rem;color:var(--ink-soft)">"Excellent quality. Ordered for Eid and received within 48 hours in Dhaka. Very happy with the purchase!"</p>
                </div>
              </div>
            </div>
            <div id="tab-delivery" class="pdp-tab-pane">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
                <div style="background:var(--green-bg);border:1.5px solid var(--green-bg2);border-radius:var(--r-lg);padding:18px;text-align:center">
                  <div style="font-size:1.4rem;margin-bottom:6px">🏙️</div>
                  <div style="font-family:var(--ff-serif);font-size:1.4rem;font-weight:500;color:var(--green)">৳80</div>
                  <div style="font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--green-2);margin:4px 0">Dhaka City</div>
                  <div style="font-size:.75rem;color:var(--green-lt)">Within 48 hours</div>
                </div>
                <div style="background:var(--light);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:18px;text-align:center">
                  <div style="font-size:1.4rem;margin-bottom:6px">🗺️</div>
                  <div style="font-family:var(--ff-serif);font-size:1.4rem;font-weight:500;color:var(--ink)">৳120</div>
                  <div style="font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);margin:4px 0">Outside Dhaka</div>
                  <div style="font-size:.75rem;color:var(--ink-soft)">Within 72 hours</div>
                </div>
              </div>
              <div style="background:var(--green-bg);border-left:3px solid var(--green);border-radius:var(--r-md);padding:14px 16px">
                <strong style="font-size:.78rem;color:var(--green-2)">Return Policy:</strong>
                <p style="font-size:.78rem;color:var(--green-2);margin-top:5px;line-height:1.8">You may check the product in front of the delivery person. If not satisfied, return it on the spot with delivery charge. No returns accepted after the delivery person leaves.</p>
              </div>
            </div>
          </div>
        </div>
      </div>`;

    // Related products
    var related = PRODUCTS.filter(function(x){ return x.category===p.category && x.id!==p.id && x.gender===p.gender; }).slice(0,4);
    if(!related.length) related = PRODUCTS.filter(function(x){ return x.gender===p.gender && x.id!==p.id; }).slice(0,4);
    if(related.length){
      var sec = document.createElement("section");
      sec.className = "products-section"; sec.style.paddingTop="0";
      sec.innerHTML = '<div class="products-inner"><div class="section-head"><span class="label">You May Also Like</span><h2 class="display-md">More '+(isM?"Men\'s":"Women\'s")+' Picks</h2></div><div class="products-grid" id="relGrid"></div></div>';
      document.getElementById("footerMount").before(sec);
      renderProducts(related, "relGrid");
    }
    observeCards();
  }

  function switchImg(i){
    var imgs=[p.image].concat(["https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=700&q=80","https://images.unsplash.com/photo-1582533561751-ef6f6ab93a2e?w=700&q=80","https://images.unsplash.com/photo-1594938298603-c8148c4b4ac8?w=700&q=80"]);
    document.getElementById("gMainImg").src=imgs[i];
    document.querySelectorAll(".g-thumb").forEach(function(t,j){ t.classList.toggle("on",j===i); });
  }
  function selSz(s,btn){ selSizeVal=s; document.querySelectorAll(".sz-btn").forEach(function(b){b.classList.remove("on");}); btn.classList.add("on"); }
  function selCol(c,el){ selColor=c; document.querySelectorAll(".col-dot").forEach(function(d){d.classList.remove("on");}); el.classList.add("on"); }
  function chgQty(d){ selQty=Math.max(1,Math.min(20,selQty+d)); document.getElementById("qtyN").value=selQty; }
  function setQty(v){ selQty=Math.max(1,Math.min(20,parseInt(v)||1)); document.getElementById("qtyN").value=selQty; }
  function swTab(id,btn){ document.querySelectorAll(".pdp-tab-btn").forEach(function(b){b.classList.remove("on");}); document.querySelectorAll(".pdp-tab-pane").forEach(function(pn){pn.classList.remove("on");}); btn.classList.add("on"); document.getElementById("tab-"+id)?.classList.add("on"); }
  function doAdd(){ if(!selSizeVal){toast("Please select a size","err");return;} cartAdd(p.id,selQty,selSizeVal,selColor); openCart(); }
  function doBuy(){  if(!selSizeVal){toast("Please select a size","err");return;} cartAdd(p.id,selQty,selSizeVal,selColor); window.location.href="checkout.html"; }

  if(p){ document.addEventListener("DOMContentLoaded", function(){ buildPage(p); }); }
  else {
    document.getElementById("pdpMain").innerHTML='<div style="text-align:center;padding:80px 24px"><h2 style="font-family:var(--ff-serif);font-size:2rem;margin-bottom:16px">Product not found</h2><a href="shop.html" class="btn btn-black">Back to Shop</a></div>';
  }
</script>
</body>
</html>
